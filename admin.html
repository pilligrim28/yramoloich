<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Админ-панель — Колесо баланса</title>
<style>
  :root {
    --primary: #4F46E5;
    --glass: rgba(255,255,255,0.12);
    --glass-border: rgba(255,255,255,0.2);
    --text: #fff;
    --radius: 14px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 50%, #a855f7 100%);
    min-height: 100vh;
    padding: 20px;
    color: var(--text);
    display: flex;
    justify-content: center;
    align-items: flex-start;
  }
  .container {
    width: 100%;
    max-width: 800px;
    background: var(--glass);
    backdrop-filter: blur(14px);
    border-radius: 24px;
    padding: 32px 24px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.35);
    border: 1px solid var(--glass-border);
  }
  .screen { display: none; animation: fadeIn 0.4s; }
  .screen.active { display: block; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

  h2 { font-size: 24px; margin-bottom: 20px; }
  .btn {
    display: block;
    width: 100%;
    padding: 16px 24px;
    border-radius: var(--radius);
    border: none;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.3s;
    font-family: inherit;
    text-decoration: none;
    text-align: center;
    margin-bottom: 12px;
  }
  .btn-primary {
    background: #fff;
    color: var(--primary);
    box-shadow: 0 8px 24px rgba(0,0,0,0.2);
  }
  .btn-secondary {
    background: rgba(255,255,255,0.15);
    color: #fff;
    border: 1px solid var(--glass-border);
  }
  .btn-small { padding: 8px 14px; font-size: 13px; width: auto; display: inline-block; }
  .btn:active { transform: translateY(2px); }

  .admin-lock { text-align: center; padding: 60px 0; }
  .admin-lock input { padding: 12px; border-radius: 10px; border: none; width: 280px; margin-bottom: 16px; text-align: center; font-size: 14px; }

  .admin-tabs { display: flex; gap: 6px; margin-bottom: 20px; overflow-x: auto; padding-bottom: 4px; }
  .admin-tab { padding: 10px 14px; background: rgba(255,255,255,0.1); border-radius: 8px; font-size: 13px; cursor: pointer; white-space: nowrap; border: none; color: #fff; transition: all 0.2s; }
  .admin-tab.active { background: #fff; color: var(--primary); font-weight: 600; }
  .admin-panel { display: none; }
  .admin-panel.active { display: block; animation: fadeIn 0.3s; }

  .admin-field { margin-bottom: 16px; }
  .admin-field label { display: block; font-size: 12px; opacity: 0.8; margin-bottom: 6px; }
  .admin-field input, .admin-field textarea { width: 100%; padding: 12px; border-radius: 8px; border: none; font-size: 14px; background: rgba(255,255,255,0.15); color: #fff; }
  .admin-field textarea { min-height: 100px; resize: vertical; }

  .md-editor { position: relative; }
  .md-toolbar { display: flex; gap: 4px; margin-bottom: 6px; flex-wrap: wrap; align-items: center; }
  .md-btn {
    background: rgba(255,255,255,0.2);
    border: 1px solid rgba(255,255,255,0.25);
    color: #fff;
    width: 32px;
    height: 32px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s;
    font-family: inherit;
  }
  .md-btn:hover { background: rgba(255,255,255,0.35); }
  .md-btn.md-emoji-btn { width: auto; padding: 0 10px; font-size: 16px; }
  .md-editor textarea, .md-editor input.md-input {
    width: 100%;
    padding: 12px;
    border-radius: 8px;
    border: none;
    font-size: 14px;
    background: rgba(255,255,255,0.15);
    color: #fff;
    font-family: inherit;
  }
  .md-editor textarea { min-height: 100px; resize: vertical; }
  .md-editor input.md-input { padding: 10px; font-size: 13px; }
  .md-hint { font-size: 11px; opacity: 0.55; margin-top: 4px; }
  .emoji-picker {
    display: none;
    position: absolute;
    z-index: 50;
    background: rgba(30, 20, 60, 0.97);
    border: 1px solid var(--glass-border);
    border-radius: 12px;
    padding: 10px;
    box-shadow: 0 12px 40px rgba(0,0,0,0.4);
    max-width: 280px;
    grid-template-columns: repeat(8, 1fr);
    gap: 4px;
  }
  .emoji-picker.open { display: grid; }
  .emoji-picker button {
    background: none;
    border: none;
    font-size: 20px;
    cursor: pointer;
    padding: 4px;
    border-radius: 6px;
    line-height: 1;
  }
  .emoji-picker button:hover { background: rgba(255,255,255,0.15); }
  .icon-row { display: flex; gap: 8px; align-items: center; }
  .icon-row input { flex: 1; }
  .icon-preview { font-size: 28px; min-width: 40px; text-align: center; }

  .q-card { background: rgba(0,0,0,0.2); border-radius: 12px; padding: 18px; margin-bottom: 14px; border: 1px solid var(--glass-border); }
  .q-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
  .q-num { font-weight: 600; font-size: 14px; }
  .q-actions button { background: rgba(255,0,0,0.3); border: none; color: #fff; padding: 6px 10px; border-radius: 6px; font-size: 12px; cursor: pointer; }

  .option-row { display: flex; gap: 8px; margin-bottom: 8px; align-items: center; }
  .option-row input { flex: 1; padding: 10px; border-radius: 6px; border: none; font-size: 13px; background: rgba(255,255,255,0.1); color: #fff; }
  .btn-icon { background: rgba(0,200,100,0.3); border: none; color: #fff; padding: 8px 14px; border-radius: 6px; font-size: 12px; cursor: pointer; font-weight: 600; }
  .btn-icon.delete { background: rgba(255,0,0,0.3); }

  .admin-actions { display: flex; gap: 10px; margin-top: 20px; flex-wrap: wrap; }
  .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #10B981; color: #fff; padding: 12px 20px; border-radius: 20px; font-size: 14px; opacity: 0; transition: 0.3s; pointer-events: none; z-index: 1000; }
  .toast.show { opacity: 1; bottom: 40px; }

  .header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }

  @media (max-width: 600px) {
    .container { padding: 24px 18px; }
    .admin-lock input { width: 100%; }
  }
</style>
</head>
<body>

<div class="container">
  <!-- LOCK SCREEN -->
  <div class="screen active" id="screen-lock">
    <div class="admin-lock">
      <h2>🔒 Админ-панель</h2>
      <p style="opacity:0.8; margin:16px 0 24px; font-size:14px;">Введите пароль для доступа к настройкам теста</p>
      <input type="password" id="admin-pass" placeholder="Пароль" onkeypress="if(event.key==='Enter') admin.check()">
      <br>
      <button class="btn btn-primary" onclick="admin.check()" style="max-width:280px; margin:0 auto;">Войти</button>
      <p style="margin-top:20px; font-size:12px; opacity:0.6;">
        <a href="index.html" style="color:#fff; opacity:0.7;">← Вернуться к тесту</a>
      </p>
    </div>
  </div>

  <!-- ADMIN PANEL -->
  <div class="screen" id="screen-admin">
    <div class="header-row">
      <h2>⚙️ Настройки теста</h2>
      <button class="btn btn-secondary btn-small" onclick="admin.logout()">Выйти</button>
    </div>

    <div class="admin-tabs">
      <button class="admin-tab active" onclick="admin.switchTab('start', this)"> Старт</button>
      <button class="admin-tab" onclick="admin.switchTab('questions', this)">❓ Вопросы</button>
      <button class="admin-tab" onclick="admin.switchTab('results', this)">🎁 Результаты</button>
      <button class="admin-tab" onclick="admin.switchTab('backup', this)">💾 Бэкап</button>
    </div>

    <!-- TAB: START -->
    <div id="tab-start" class="admin-panel active">
      <div class="admin-field">
        <label>Заголовок главной страницы</label>
        <input id="adm-title">
      </div>
      <div class="admin-field">
        <label>Подзаголовок (описание теста)</label>
        <div id="adm-lead-wrap"></div>
      </div>
      <button class="btn btn-primary" onclick="admin.save()">💾 Сохранить изменения</button>
    </div>

    <!-- TAB: QUESTIONS -->
    <div id="tab-questions" class="admin-panel">
      <div id="questions-list"></div>
      <button class="btn btn-secondary" onclick="admin.addQuestion()">+ Добавить вопрос</button>
      <div class="admin-actions">
        <button class="btn btn-primary" onclick="admin.save()">💾 Сохранить все изменения</button>
        <button class="btn btn-secondary" onclick="admin.resetDefaults()"> Сбросить к исходным</button>
      </div>
    </div>

    <!-- TAB: RESULTS -->
    <div id="tab-results" class="admin-panel">
      <div id="results-editor"></div>
      <button class="btn btn-primary" onclick="admin.save()">💾 Сохранить изменения</button>
    </div>

    <!-- TAB: BACKUP -->
    <div id="tab-backup" class="admin-panel">
      <p style="font-size:14px; opacity:0.9; margin-bottom:20px; line-height:1.6;">
        Экспортируйте настройки в файл для резервной копии или загрузите ранее сохранённый JSON.
      </p>
      <div class="admin-actions">
        <button class="btn btn-secondary" onclick="admin.export()">📥 Скачать JSON</button>
        <label class="btn btn-secondary" style="cursor:pointer; text-align:center; flex:1;">
           Загрузить JSON
          <input type="file" accept=".json" onchange="admin.import(this)" style="display:none;">
        </label>
        <button class="btn btn-secondary" onclick="admin.clearStorage()">🗑 Очистить данные</button>
      </div>
      <p style="margin-top:20px; font-size:12px; opacity:0.7;">
        <a href="index.html" style="color:#fff;">← Перейти к тесту</a>
      </p>
    </div>
  </div>
</div>

<div class="toast" id="toast">Сохранено!</div>

<script>
const DEFAULT_DATA = {

    { q: "На что ты чаще обращаешь внимание в соцсетях?", opts: [{t:"Отдых, природа, спокойные картинки", k:"A"}, {t:"Отношения, искренние истории", k:"B"}, {t:"Путешествия, события, яркие моменты", k:"V"}, {t:"Обучение, развитие, полезные разборы", k:"G"}] },
    { q: "Если у тебя есть час только для себя, ты…", opts: [{t:"Ляжешь и отдохнёшь", k:"A"}, {t:"Свяжешься с близким человеком", k:"B"}, {t:"Пойдёшь куда-то новое", k:"V"}, {t:"Займёшься чем-то полезным для развития", k:"G"}] },
    { q: "Чего тебе сейчас больше всего не хватает?", opts: [{t:"Энергии и покоя", k:"A"}, {t:"Тепла и поддержки", k:"B"}, {t:"Вдохновения и эмоций", k:"V"}, {t:"Понимания, куда двигаться", k:"G"}] },
    { q: "Что говорит тебе твоё тело?", opts: [{t:"Я усталО, мне нужен отдых", k:"A"}, {t:"Мне не хватает заботы и мягкости", k:"B"}, {t:"Мне нужно движение, смена обстановки", k:"V"}, {t:"У меня перегруз в голове", k:"G"}] },
    { q: "Если представить фильм про твою жизнь сейчас, он был бы…", opts: [{t:"Спокойный, но немного затянутый", k:"A"}, {t:"Про отношения и переживания", k:"B"}, {t:"Про поиск и приключения", k:"V"}, {t:"Про рост, цели и достижения", k:"G"}] },
    { q: "Что поможет тебе почувствовать себя лучше уже сегодня?", opts: [{t:"Отдохнуть и отключиться", k:"A"}, {t:"Поговорить по душам", k:"B"}, {t:"Сделать что-то новое или спонтанное", k:"V"}, {t:"Получить инсайт или идею", k:"G"}] },
    { q: "О чём ты сейчас мечтаешь сильнее всего?", opts: [{t:"Просто выдохнуть и восстановиться", k:"A"}, {t:"Быть рядом с «своими» людьми", k:"B"}, {t:"Ярко пожить, сменить обстановку", k:"V"}, {t:"Выйти на новый уровень в жизни или работе", k:"G"}] },
    { q: "Какой подарок тебя сейчас реально обрадует?", opts: [{t:"Отдых, массаж, SPA", k:"A"}, {t:"Время с близкими", k:"B"}, {t:"Новые впечатления", k:"V"}, {t:"Обучение или личная консультация", k:"G"}] }
  ],
  results: {
    A: { icon: "🌿", title: "Тело и релакс", text: "Похоже, сейчас тебе нужен не новый рывок, а отдых и восстановление. Тело уже давно просит замедлиться и вернуть себе ресурс.", gift: "🎁 Медитации для восстановления\n🎁 Сертификат от партнёра на практику для тела", buttons: [{t:"🧘 Получить медитации", u:"#", sec:false}, {t:"💆 Получить релакс в подарок", u:"#", sec:true}] },
    B: { icon: "❤️", title: "Отношения и окружение", text: "Сейчас твой главный ресурс — люди рядом. Поддержка, тёплое общение, новые знакомства и окружение, где тебя понимают.", gift: "🎁 Участвуй в онлайн-нетворкингах «Бизнес на связях» в чате. Читай закреп, пиши визитку, получай новых друзей, партнёров и тёплое общение.", buttons: [{t:"🎟 Получить билет на нетворкинг", u:"#", sec:false}] },
    V: { icon: "✨", title: "Впечатления и эмоции", text: "Тебе сейчас нужны новые эмоции, движение и смена обстановки. Иногда одна поездка или новое окружение дают больше энергии, чем месяцы рутины.", gift: "Мы организуем путешествия и выезды по России и за границу — с атмосферой, отдыхом, нетворкингом и яркими впечатлениями ✈️", buttons: [{t:"🏔 Поездки по России", u:"#", sec:false}, {t:"🎓 Выезды с обучением и нетворкингом", u:"#", sec:false}, {t:"🧖 SPA / relax-выезды", u:"#", sec:false}, {t:"🔔 Хочу узнавать обо всех поездках", u:"#", sec:true}] },
    G: { icon: "🚀", title: "Развитие и рост", text: "Сейчас тебе важно вернуть ощущение движения и ясности. Внутри есть желание расти, но не всегда хватает системы и понятного вектора.", gift: "🎁 Мы дарим тебе «Зеркальный спринт» — пространство, где мы соединяем тело, цели, продвижение и рост, уделяя им внимание 25 минут в день.", buttons: [{t:"🚀 Войти в Зеркальный спринт", u:"https://t.me/your_bot", sec:false}, {t:"Промокод: РОСТ", u:"#", sec:true}] }

};

const EMOJI_LIST = [
  '😀','😃','😄','😁','😊','🥰','😍','🤩','😎','🤗','🤔','😴','🥱','😢','😭','🤯',
  '💪','👍','👏','🙌','🤝','💬','❤️','🧡','💛','💚','💙','💜','🖤','🤍','💕','💖',
  '✨','⭐','🌟','💫','🔥','💥','⚡','🌈','☀️','🌙','🌿','🍀','🌸','🌺','🌻','🌹',
  '🎁','🎉','🎊','🏆','🥇','🎯','🚀','✈️','🏔','🧖','💆','🧘','🎓','📚','💼','💡',
  '🔔','🎟','🏠','🔑','✅','❌','⚠️','💯','🧠','💎','🌍','🏕','⛺','🛁','🍃','🦋'
];

const mdEditor = {
  activePicker: null,
  createField({ value = '', onInput, placeholder = '', multiline = true, minHeight = '100px' }) {
    const wrap = document.createElement('div');
    wrap.className = 'md-editor';

    const toolbar = document.createElement('div');
    toolbar.className = 'md-toolbar';
    toolbar.innerHTML = `
      <button type="button" class="md-btn" title="Жирный (**текст**)"><b>B</b></button>
      <button type="button" class="md-btn" title="Курсив (*текст*)"><i>I</i></button>
      <button type="button" class="md-btn" title="Подчёркивание (__текст__)"><u>U</u></button>
      <button type="button" class="md-btn md-emoji-btn" title="Вставить эмодзи">😀</button>
    `;
    toolbar.querySelectorAll('.md-btn')[0].onclick = (e) => this.applyFormat(e.currentTarget, '**');
    toolbar.querySelectorAll('.md-btn')[1].onclick = (e) => this.applyFormat(e.currentTarget, '*');
    toolbar.querySelectorAll('.md-btn')[2].onclick = (e) => this.applyFormat(e.currentTarget, '__');
    toolbar.querySelectorAll('.md-btn')[3].onclick = (e) => this.toggleEmoji(e.currentTarget);

    const field = multiline ? document.createElement('textarea') : document.createElement('input');
    if (!multiline) {
      field.type = 'text';
      field.className = 'md-input';
    }
    field.value = value;
    field.placeholder = placeholder;
    if (multiline) field.style.minHeight = minHeight;
    if (onInput) {
      field.addEventListener('input', onInput);
      field.addEventListener('change', onInput);
    }

    const hint = document.createElement('div');
    hint.className = 'md-hint';
    hint.textContent = '**жирный** · *курсив* · __подчёркивание__ · эмодзи 😀';

    const picker = this.createEmojiPicker(field);
    wrap.appendChild(toolbar);
    wrap.appendChild(field);
    if (multiline) wrap.appendChild(hint);
    wrap.appendChild(picker);
    return wrap;
  },
  getField(el) {
    const editor = el.closest('.md-editor');
    return editor ? editor.querySelector('textarea, input.md-input') : null;
  },
  applyFormat(btn, marker) {
    const field = this.getField(btn);
    if (!field) return;
    const start = field.selectionStart;
    const end = field.selectionEnd;
    const val = field.value;
    const selected = val.substring(start, end);
    const before = val.substring(0, start);
    const after = val.substring(end);
    if (selected) {
      field.value = before + marker + selected + marker + after;
      field.selectionStart = start;
      field.selectionEnd = start + marker.length + selected.length + marker.length;
    } else {
      field.value = before + marker + marker + after;
      field.selectionStart = field.selectionEnd = start + marker.length;
    }
    field.dispatchEvent(new Event('input', { bubbles: true }));
    field.focus();
  },
  createEmojiPicker(targetField) {
    const picker = document.createElement('div');
    picker.className = 'emoji-picker';
    EMOJI_LIST.forEach(emoji => {
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.textContent = emoji;
      btn.onclick = () => {
        this.insertEmoji(targetField, emoji);
        picker.classList.remove('open');
        this.activePicker = null;
      };
      picker.appendChild(btn);
    });
    return picker;
  },
  toggleEmoji(btn) {
    const picker = btn.closest('.md-editor').querySelector('.emoji-picker');
    if (this.activePicker && this.activePicker !== picker) {
      this.activePicker.classList.remove('open');
    }
    const isOpen = picker.classList.toggle('open');
    this.activePicker = isOpen ? picker : null;
  },
  insertEmoji(field, emoji) {
    const start = field.selectionStart ?? field.value.length;
    const end = field.selectionEnd ?? field.value.length;
    field.value = field.value.substring(0, start) + emoji + field.value.substring(end);
    const pos = start + emoji.length;
    field.selectionStart = field.selectionEnd = pos;
    field.dispatchEvent(new Event('input', { bubbles: true }));
    field.focus();
  },
  createIconField({ value = '', onInput }) {
    const wrap = document.createElement('div');
    wrap.className = 'icon-row';

    const preview = document.createElement('span');
    preview.className = 'icon-preview';
    preview.textContent = value || '❓';

    const input = document.createElement('input');
    input.value = value;
    input.placeholder = 'Эмодзи';
    input.style.cssText = 'flex:1;padding:12px;border-radius:8px;border:none;font-size:14px;background:rgba(255,255,255,0.15);color:#fff;';
    const update = () => {
      preview.textContent = input.value || '❓';
      if (onInput) onInput();
    };
    input.addEventListener('input', update);
    input.addEventListener('change', update);

    const emojiBtn = document.createElement('button');
    emojiBtn.type = 'button';
    emojiBtn.className = 'md-btn md-emoji-btn';
    emojiBtn.textContent = '😀';
    emojiBtn.title = 'Выбрать эмодзи';

    const pickerWrap = document.createElement('div');
    pickerWrap.style.position = 'relative';
    const picker = this.createEmojiPicker(input);
    emojiBtn.onclick = () => {
      if (this.activePicker && this.activePicker !== picker) {
        this.activePicker.classList.remove('open');
      }
      const isOpen = picker.classList.toggle('open');
      this.activePicker = isOpen ? picker : null;
    };

    pickerWrap.appendChild(emojiBtn);
    pickerWrap.appendChild(picker);
    wrap.appendChild(preview);
    wrap.appendChild(input);
    wrap.appendChild(pickerWrap);
    wrap._input = input;
    return wrap;
  }
};

document.addEventListener('click', (e) => {
  if (!e.target.closest('.md-editor') && !e.target.closest('.icon-row')) {
    document.querySelectorAll('.emoji-picker.open').forEach(p => p.classList.remove('open'));
    mdEditor.activePicker = null;
  }
});

const dataManager = {
  data: null,
  load() {
    const stored = localStorage.getItem('wheelQuizData');
    this.data = stored ? JSON.parse(stored) : JSON.parse(JSON.stringify(DEFAULT_DATA));
  },
  save() {
    localStorage.setItem('wheelQuizData', JSON.stringify(this.data));
    toast('✅ Сохранено!');
  },
  reset() {
    this.data = JSON.parse(JSON.stringify(DEFAULT_DATA));
    this.save();
    admin.renderAll();
    toast('🔄 Сброшено к стандартным');
  }
};

const admin = {
  password: 'admin123',
  activeTab: 'start',
  check() {
    const pass = document.getElementById('admin-pass').value;
    if (pass === this.password) {
      switchScreen('screen-admin');
      dataManager.load();
      this.renderAll();
    } else {
      alert('❌ Неверный пароль');
    }
  },
  logout() {
    document.getElementById('admin-pass').value = '';
    switchScreen('screen-lock');
  },
  switchTab(tab, btn) {
    this.activeTab = tab;
    document.querySelectorAll('.admin-tab').forEach(el => el.classList.remove('active'));
    document.querySelectorAll('.admin-panel').forEach(el => el.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('tab-' + tab).classList.add('active');
    if (tab === 'questions') this.renderQuestions();
    if (tab === 'results') this.renderResults();
  },
  renderAll() {
    document.getElementById('adm-title').value = dataManager.data.start.title;
    const leadWrap = document.getElementById('adm-lead-wrap');
    leadWrap.innerHTML = '';
    leadWrap.appendChild(mdEditor.createField({
      value: dataManager.data.start.lead,
      onInput: (e) => { dataManager.data.start.lead = e.target.value; }
    }));
    this.renderQuestions();
    this.renderResults();
  },
  renderQuestions() {
    const list = document.getElementById('questions-list');
    list.innerHTML = '';
    dataManager.data.questions.forEach((q, qi) => {
      const card = document.createElement('div');
      card.className = 'q-card';

      const header = document.createElement('div');
      header.className = 'q-header';
      header.innerHTML = `<span class="q-num">Вопрос ${qi + 1}</span><div class="q-actions"><button type="button">✖ Удалить</button></div>`;
      header.querySelector('button').onclick = () => this.deleteQuestion(qi);

      const qField = document.createElement('div');
      qField.className = 'admin-field';
      qField.appendChild(mdEditor.createField({
        value: q.q,
        placeholder: 'Текст вопроса',
        multiline: false,
        onInput: (e) => { dataManager.data.questions[qi].q = e.target.value; }
      }));

      const optsWrap = document.createElement('div');
      q.opts.forEach((o, oi) => {
        const row = document.createElement('div');
        row.className = 'option-row';
        const editor = mdEditor.createField({
          value: o.t,
          placeholder: `Вариант ${o.k}`,
          multiline: false,
          onInput: (e) => { dataManager.data.questions[qi].opts[oi].t = e.target.value; }
        });
        editor.style.flex = '1';
        const label = document.createElement('span');
        label.style.cssText = 'font-size:12px; opacity:0.7; min-width:30px;';
        label.textContent = o.k;
        row.appendChild(editor);
        row.appendChild(label);
        optsWrap.appendChild(row);
      });

      card.appendChild(header);
      card.appendChild(qField);
      card.appendChild(optsWrap);
      list.appendChild(card);
    });
  },
  addQuestion() {
    dataManager.data.questions.push({
      q: "Новый вопрос",
      opts: [{t:"Ответ 1", k:"A"}, {t:"Ответ 2", k:"B"}, {t:"Ответ 3", k:"V"}, {t:"Ответ 4", k:"G"}]
    });
    this.renderQuestions();
  },
  deleteQuestion(idx) {
    if (confirm('Удалить этот вопрос?')) {
      dataManager.data.questions.splice(idx, 1);
      this.renderQuestions();
    }
  },
  renderResults() {
    const ed = document.getElementById('results-editor');
    ed.innerHTML = '';
    ['A','B','V','G'].forEach(k => {
      const r = dataManager.data.results[k];
      const card = document.createElement('div');
      card.className = 'q-card';

      const title = document.createElement('h3');
      title.style.cssText = 'margin-bottom:14px; font-size:16px;';
      title.textContent = `🎯 Результат ${k}`;

      const iconField = document.createElement('div');
      iconField.className = 'admin-field';
      iconField.innerHTML = '<label>Иконка (эмодзи)</label>';
      iconField.appendChild(mdEditor.createIconField({
        value: r.icon,
        onInput: () => { dataManager.data.results[k].icon = iconField.querySelector('input').value; }
      }));

      const titleField = document.createElement('div');
      titleField.className = 'admin-field';
      titleField.innerHTML = '<label>Заголовок</label>';
      titleField.appendChild(mdEditor.createField({
        value: r.title,
        multiline: false,
        onInput: (e) => { dataManager.data.results[k].title = e.target.value; }
      }));

      const textField = document.createElement('div');
      textField.className = 'admin-field';
      textField.innerHTML = '<label>Текст результата</label>';
      textField.appendChild(mdEditor.createField({
        value: r.text,
        onInput: (e) => { dataManager.data.results[k].text = e.target.value; }
      }));

      const giftField = document.createElement('div');
      giftField.className = 'admin-field';
      giftField.innerHTML = '<label>Подарки и описание</label>';
      giftField.appendChild(mdEditor.createField({
        value: r.gift,
        onInput: (e) => { dataManager.data.results[k].gift = e.target.value; }
      }));

      const buttonsField = document.createElement('div');
      buttonsField.className = 'admin-field';
      buttonsField.innerHTML = '<label>Кнопки действий</label>';
      r.buttons.forEach((b, bi) => {
        const row = document.createElement('div');
        row.className = 'option-row';
        const btnEditor = mdEditor.createField({
          value: b.t,
          placeholder: 'Текст кнопки',
          multiline: false,
          onInput: (e) => { dataManager.data.results[k].buttons[bi].t = e.target.value; }
        });
        btnEditor.style.flex = '1';
        const urlInput = document.createElement('input');
        urlInput.value = b.u;
        urlInput.placeholder = 'https://';
        urlInput.style.flex = '1.5';
        urlInput.onchange = () => { dataManager.data.results[k].buttons[bi].u = urlInput.value; };
        const delBtn = document.createElement('button');
        delBtn.type = 'button';
        delBtn.className = 'btn-icon delete';
        delBtn.textContent = '✖';
        delBtn.onclick = () => this.deleteButton(k, bi);
        row.appendChild(btnEditor);
        row.appendChild(urlInput);
        row.appendChild(delBtn);
        buttonsField.appendChild(row);
      });
      const addBtn = document.createElement('button');
      addBtn.type = 'button';
      addBtn.className = 'btn-icon';
      addBtn.textContent = '+ Добавить кнопку';
      addBtn.onclick = () => this.addButton(k);
      buttonsField.appendChild(addBtn);

      card.appendChild(title);
      card.appendChild(iconField);
      card.appendChild(titleField);
      card.appendChild(textField);
      card.appendChild(giftField);
      card.appendChild(buttonsField);
      ed.appendChild(card);
    });
  },
  addButton(k) {
    dataManager.data.results[k].buttons.push({t:"Новая кнопка", u:"#", sec:true});
    this.renderResults();
  },
  deleteButton(k, idx) {
    dataManager.data.results[k].buttons.splice(idx, 1);
    this.renderResults();
  },
  save() {
    dataManager.data.start.title = document.getElementById('adm-title').value;
    const leadField = document.querySelector('#adm-lead-wrap textarea');
    if (leadField) dataManager.data.start.lead = leadField.value;
    dataManager.save();
  },
  resetDefaults() {
    if (confirm('⚠️ Сбросить все настройки к исходным? Это удалит все ваши изменения.')) {
      dataManager.reset();
    }
  },
  export() {
    const blob = new Blob([JSON.stringify(dataManager.data, null, 2)], {type: 'application/json'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'wheel-quiz-backup-' + new Date().toISOString().slice(0,10) + '.json';
    a.click();
    toast('📥 Файл скачан');
  },
  import(input) {
    const file = input.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = e => {
      try {
        dataManager.data = JSON.parse(e.target.result);
        dataManager.save();
        this.renderAll();
        toast('✅ Загружено!');
      } catch {
        alert('❌ Ошибка чтения JSON файла');
      }
    };
    reader.readAsText(file);
  },
  clearStorage() {
    if (confirm('⚠️ Очистить все сохранённые данные? Тест вернётся к настройкам по умолчанию.')) {
      localStorage.removeItem('wheelQuizData');
      dataManager.load();
      this.renderAll();
      toast('🗑 Данные очищены');
    }
  }
};

function switchScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo({top: 0, behavior: 'smooth'});
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}
</script>
